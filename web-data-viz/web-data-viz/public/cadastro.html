<!DOCTYPE html>

<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/cadastro.css">
  <script src="./js/sessao.js"></script>

  <link rel="icon" href="./assets/img/logo.png" />

</head>

<body>

  <div id="header"></div>

  <script>
    fetch("/includes/header.html")
      .then(resposta => resposta.text())
      .then(dados => {
        document.getElementById("header").innerHTML = dados
      });
  </script>


  <div class="container_geral">


    <div class="formulario">
      <p class="titulo_formulario">Crie sua conta</p>
      <img src="/assets/img/logo.png" alt="">
      <div class="input_geral">
        <label for="">Nome:</label>
        <input type="text" id="nome_input">
        <label for="">Email:</label>
        <input type="email" id="email_input">
        <label for="">Senha:</label>
        <input type="password" id="senha_input">
        <label for="">Confirme sua senha:</label>
        <input type="password" id="confirmacao_senha_input">
      </div>
      <button onclick="cadastrar()">Cadastrar</button>
      <a href="login.html">Já tenho uma conta</a>
      
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>

      <div id="div_aguardar" class="loading-div">
        <img src="/assets/circle-loading.gif" id="loading-gif" />
      </div>

      <div id="div_erros_login"></div>
    </div>


  </div>
</body>

<script>

</script>

</html>



<script>



  function cadastrar() {

    aguardar()

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;


    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
      ;

    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,

      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }



  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
