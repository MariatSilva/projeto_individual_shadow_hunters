<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/site/public/css/navbar.css">
    <link rel="stylesheet" href="/site/public/css/login.css">
</head>

<body>
   
    <div id="header"></div>

    <script>
        fetch("/site/includes/header.html")
        .then(resposta => resposta.text())
        .then(dados =>{
        document.getElementById("header").innerHTML = dados
        });
    </script>


    <div class="container_geral">

        <div class="formulario">
            <p class="titulo_formulario">Bem-vindo de volta</p>
            <img src="/site/public/img/logo_branco.png" alt="">
            <div class="input_geral">
               
                <label for="">Email:</label>
                <input type="email" id="ipt_email">
                <label for="">Senha:</label>
                <input type="text" id="ipt_senha">
        
            </div>  
            <a href="">Esqueci minha senha</a>
            <button onclick="cadastrar()">Entrar</button>
          
        </div>

    </div>
</body>

</html>
