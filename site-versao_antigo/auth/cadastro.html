<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/site/public/css/navbar.css">
    <link rel="stylesheet" href="/site/public/css/cadastro.css">
</head>

<body>
   
    <div id="header"></div>

    <script>
        fetch("/site/includes/header.html")
        .then(resposta => resposta.text())
        .then(dados =>{
        document.getElementById("header").innerHTML = dados
        });
    </script>


    <div class="container_geral">

        <div class="formulario">
            <p class="titulo_formulario">Crie sua conta</p>
            <img src="/site/public/img/logo.png" alt="">
            <div class="input_geral">
                <label for="">Nome:</label>
                <input type="text" id="ipt_nome">
                <label for="">Email:</label>
                <input type="email" id="ipt_email">
                <label for="">Senha:</label>
                <input type="text" id="ipt_senha">
                <label for="">Confirme sua senha:</label>
                <input type="text" id="ipt_confirmar_senha">
            </div>
            <button onclick="cadastrar()">Cadastrar</button>
            <a href="/site/auth/login.html">Já tenho uma conta</a>
        </div>

    </div>
</body>

<script>
 
</script>
</html>
